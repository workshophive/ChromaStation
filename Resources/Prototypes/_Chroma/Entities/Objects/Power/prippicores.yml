- type: entity
  id: BasePrippiCore
  abstract: true
  parent: BaseItem
  components:
  - type: Item
    storedRotation: -90
  - type: Battery
    pricePerJoule: 0.30
  - type: PowerCell
  - type: Sprite
    sprite: _Chroma/Objects/Power/prippi_cores.rsi
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 15
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Ectoplasm
        Quantity: 5
  - type: Tag
    tags:
    - PowerCell
    
- type: entity
  id: PrippiCoreBasic
  name: normal prippi core
  description: A core from a prippi, used as their source of energy. Hypothetically works with devices & species that need energy.
  suffix: Full
  parent: BasePrippiCore
  components:
  - type: Sprite
    state: basic
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: MachinePart # don't do this. it's possible but please don't
    partType: PowerCell
    rating: 3
    
- type: entity
  id: PrippiCoreBasicPrinted
  suffix: Empty
  parent: PrippiCoreBasic
  components:
  - type: Battery
    maxCharge: 1000
    startingCharge: 0
    
- type: entity
  parent: BasePrippiCore
  id: PrippiCoreMicro
  name: microreactor prippi core
  description: A modified version of a prippi core that can recharge by itself. One of the prides of Einstein Engines.
  suffix: Full
  components:
  - type: Sprite
    state: micro
  - type: Battery
    maxCharge: 720
    startingCharge: 720
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 12
    
- type: entity
  parent: PrippiCoreMicro
  id: PrippiCoreMicroPrinted
  suffix: Empty
  components:
  - type: Battery
    startingCharge: 0