- type: entity
  id: PartShiverfolk
  parent: BaseItem
  name: "shiverfolk body part"
  abstract: true
  components:
    - type: Sprite
      netsync: false
      sprite: _Chroma/Mobs/Species/Shiverfolk/parts.rsi
    - type: Icon
      sprite: _Chroma/Mobs/Species/Shiverfolk/parts.rsi
    - type: Damageable
      damageContainer: OrganicPart # Shitmed
    - type: BodyPart
    - type: ContainerContainer
      containers:
        bodypart: !type:Container
          ents: []

- type: entity
  id: TorsoShiverfolk
  name: "shiverfolk torso"
  parent: PartShiverfolk
  components:
    - type: Sprite
      state: "torso"
    - type: Icon
      state: "torso"
    - type: BodyPart
      partType: Torso

- type: entity
  id: HeadShiverfolk
  name: "shiverfolk head"
  parent: PartShiverfolk
  components:
    - type: Sprite
      state: "head"
    - type: Icon
      state: "head"
    - type: BodyPart
      partType: Head
    - type: Input
      context: "ghost"
    - type: MovementSpeedModifier
      baseWalkSpeed: 0
      baseSprintSpeed: 0
    - type: InputMover
    - type: GhostOnMove

- type: entity
  id: LeftArmShiverfolk
  name: "left shiverfolk arm"
  parent: PartShiverfolk
  components:
