- type: entity
  id: PartMynki
  parent: BaseItem
  name: "mynki body part"
  abstract: true
  components:
    - type: Sprite
      netsync: false
      sprite: _Chroma/Mobs/Species/Mynki/parts.rsi
    - type: Icon
      sprite: _Chroma/Mobs/Species/Mynki/parts.rsi
    - type: Damageable
      damageContainer: OrganicPart # Shitmed
    - type: BodyPart
    - type: ContainerContainer
      containers:
        bodypart: !type:Container
          ents: []

- type: entity
  id: TorsoMynki
  name: "mynki torso"
  parent: PartMynki
  components:
    - type: Sprite
      state: "torso"
    - type: Icon
      state: "torso"
    - type: BodyPart
      partType: Torso

- type: entity
  id: HeadMynki
  name: "mynki head"
  parent: PartMynki
  components:
    - type: Sprite
      state: "head"
    - type: Icon
      state: "head"
    - type: BodyPart
      partType: Head
    - type: Input
      context: "ghost"
    - type: MovementSpeedModifier
      baseWalkSpeed: 0
      baseSprintSpeed: 0
    - type: InputMover
    - type: GhostOnMove

- type: entity
  id: LeftArmMynki
  name: "left mynki arm"
  parent: PartMynki
  components:
    - type: Sprite
      state: "l_arm"
    - type: Icon
      state: "l_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Left

- type: entity
  id: RightArmMynki
  name: "right mynki arm"
  parent: PartMynki
  components:
    - type: Sprite
      state: "r_arm"
    - type: Icon
      state: "r_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Right

