- type: entity
  id: PartNightmare
  parent: BaseItem
  name: "Nightmare body part"
  abstract: true
  components:
    - type: Sprite
      netsync: false
      sprite: _Chroma/Mobs/Species/Nightmare/parts.rsi
    - type: Icon
      sprite: _Chroma/Mobs/Species/Nightmare/parts.rsi
    - type: Damageable
      damageContainer: OrganicPart # Shitmed
    - type: BodyPart
    - type: ContainerContainer
      containers:
        bodypart: !type:Container
          ents: []

- type: entity
  id: TorsoNightmare
  name: "Nightmare torso"
  parent: PartNightmare
  components:
    - type: Sprite
      state: "torso_m"
    - type: Icon
      state: "torso_m"
    - type: BodyPart
      partType: Torso

- type: entity
  id: HeadNightmare
  name: "Nightmare head"
  parent: PartNightmare
  components:
    - type: Sprite
      state: "head_m"
    - type: Icon
      state: "head_m"
    - type: BodyPart
      partType: Head
    - type: Input
      context: "ghost"
    - type: MovementSpeedModifier
      baseWalkSpeed: 0
      baseSprintSpeed: 0
    - type: InputMover
    - type: GhostOnMove

- type: entity
  id: LeftArmNightmare
  name: "left Nightmare arm"
  parent: PartNightmare
  components:
    - type: Sprite
      state: "l_arm"
    - type: Icon
      state: "l_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Left

- type: entity
  id: RightArmNightmare
  name: "right Nightmare arm"
  parent: PartNightmare
  components:
    - type: Sprite
      state: "r_arm"
    - type: Icon
      state: "r_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Right

