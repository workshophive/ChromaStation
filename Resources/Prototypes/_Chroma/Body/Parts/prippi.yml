- type: entity
  id: PartPrippi
  parent: BaseItem
  name: "prippi body part"
  abstract: true
  components:
    - type: Sprite
      netsync: false
      sprite: _Chroma/Mobs/Species/Prippi/parts.rsi
    - type: Icon
      sprite: _Chroma/Mobs/Species/Prippi/parts.rsi
    - type: Damageable
      damageContainer: OrganicPart # Shitmed
    - type: BodyPart
    - type: ContainerContainer
      containers:
        bodypart: !type:Container
          ents: []

- type: entity
  id: TorsoPrippi
  name: "prippi torso"
  parent: PartPrippi
  components:
    - type: Sprite
      state: "torso"
    - type: Icon
      state: "torso"
    - type: BodyPart
      partType: Torso

- type: entity
  id: HeadPrippi
  name: "prippi head"
  parent: PartPrippi
  components:
    - type: Sprite
      state: "head"
    - type: Icon
      state: "head"
    - type: BodyPart
      partType: Head
    - type: Input
      context: "ghost"
    - type: MovementSpeedModifier
      baseWalkSpeed: 0
      baseSprintSpeed: 0
    - type: InputMover
    - type: GhostOnMove

- type: entity
  id: LeftArmPrippi
  name: "left prippi arm"
  parent: PartPrippi
  components:
    - type: Sprite
      state: "l_arm"
    - type: Icon
      state: "l_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Left

- type: entity
  id: RightArmPrippi
  name: "right prippi arm"
  parent: PartPrippi
  components:
    - type: Sprite
      state: "r_arm"
    - type: Icon
      state: "r_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Right

- type: entity
  id: LeftHandPrippi
  name: "left prippi hand"
