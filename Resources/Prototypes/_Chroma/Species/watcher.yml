- type: species
  id: Watcher
  name: species-name-watcher
  roundStart: true
  prototype: MobWatcher
  sprites: MobWatcherSprites
  markingLimits: MobWatcherMarkingLimits
  dollPrototype: MobWatcherDummy
  skinColoration: Hues # todo: make DarkHues
  bonusTraitPoints: 1
  minAge: 18
  maxAge: 250
  youngAge: 80
  oldAge: 175
  sexes:
    - Male
    - Female
    - Unsexed
  minHeight: 0.55
  defaultHeight: 0.75
  maxHeight: 1.05
  minWidth: 0.5
  defaultWidth: 0.75
  maxWidth: 1.1

- type: speciesBaseSprites
  id: MobWatcherSprites
  sprites:
    Head: MobWatcherHead
    Snout: MobWatcherAMFS
    HeadTop: MobWatcherAMFS
    Tail: MobHumanoidAnyMarking
    Chest: MobWatcherTorso
    Eyes: MobWatcherEyes
    LArm: MobWatcherLArm
    RArm: MobWatcherRArm
    LHand: MobWatcherLHand
    RHand: MobWatcherRHand
    LLeg: MobWatcherLLeg
    RLeg: MobWatcherRLeg
    LFoot: MobWatcherLFoot
    RFoot: MobWatcherRFoot

- type: markingPoints
  id: MobWatcherMarkingLimits
  points:
    HeadTop:
      points: 1
      required: false # change to required later, add defaultMarkings Tail

- type: humanoidBaseSprite
  id: MobWatcherAMFS # any marking follow skin
  markingsMatchSkin: true
  
