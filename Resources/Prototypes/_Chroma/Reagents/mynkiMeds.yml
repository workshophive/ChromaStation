# medicine intended for mynki lol

- type: reagent
  id: Nitrate
  name: reagent-name-nitrate
  desc: reagent-desc-nitrate
  physicalDesc: reagent-physical-desc-pungent
  flavor: bitter
  color: "#a3b57b"
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        damage:
          types:
            Bloodloss: 1.5 # nitrate causes methemoglobinemia
            Poison: 1.5
      - !type:ModifyBloodLevel
        amount: -2.5

- type: reagent
  id: SilverOxide
  name: reagent-name-silveroxide
  group: Medicine
  desc: reagent-desc-silveroxide
  physicalDesc: reagent-physical-desc-powdery
  flavor: medicine
  color: "#525252"
  metabolisms:
    Medicine:
      effects:
      - !type:GenericStatusEffect
        key: Drunk
        time: 6.0
        type: Remove
      - !type:GenericStatusEffect # higher effect on mynki bc silver based & antidrunk 
        conditions:
        - !type:OrganType
          type: Mynki
        key: Drunk
        time: 16.0
        type: Remove
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Mynki
        damage:
          types:
            Caustic: -1.0
            Cold: -2.0
            Heat: 0.5
      - !type:AdjustReagent
        conditions:
        - !type:OrganType
          type: Mynki
        - !type:ReagentThreshold
          reagent: Ethanol
          min: 0.5
        reagent: Ethanol
        amount: -3
            
- type: reagent
  id: SilverNitrate
  name: reagent-name-silvernitrate
  group: Medicine
  desc: reagent-desc-silvernitrate
  physicalDesc: reagent-physical-desc-crystalline
  flavor: medicine
  color: "#f2f2f2"
  metabolisms:
    Medicine:
      effects:
      - !type:ModifyBleedAmount
        amount: -0.5
      - !type:ModifyBleedAmount
        conditions:
        - !type:OrganType
          type: Mynki
        amount: -2.5
      - !type:AdjustReagent
        conditions:
        - !type:ReagentThreshold
          reagent: Dylovene
          min: 20
        reagent: Dylovene
        amount: -4

- type: reagent
  id: ColloidalSilver
  name: reagent-name-colloidalsilver
  group: Toxins # mostly because it's dangerous as fuck to any species but mynki lol
  desc: reagent-desc-colloidalsilver
  physicalDesc: reagent-physical-desc-heterogeneous
  flavor: paintthinner
  color: "#c6dade"
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        conditions:
        - !type:OrganType # make this every species BUT mynki at some point
          type: Human
        damage:
          types:
            Poison: 2.5
    Medicine:
      effects:
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Mynki
        damage:
          types:
            Caustic: -2
            Poison: -3.5
            
# todo: make argyrol an anti-septic when viro is ported
# currently just oculine but for mynki that also satiates their hunger
- type: reagent
  id: Argyrol
  name: reagent-name-argyrol
  group: Medicine
  desc: reagent-desc-argyrol
  physicalDesc: reagent-physical-desc-fizzy
  flavor: medicine
  color: "#ab995e"
  metabolisms:
    Medicine:
      effects:
      - !type:ChemHealEyeDamage
        conditions:
        - !type:OrganType
          type: Mynki
      - !type:SatiateHunger
        factor: 0.33
        conditions:
        - !type:OrganType
          type: Mynki