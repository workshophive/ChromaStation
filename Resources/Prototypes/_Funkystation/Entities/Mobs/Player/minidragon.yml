- type: entity
  name: mini dragon
  id: BaseMobMiniDragon
  parent: [ SimpleSpaceMobBase, FlyingMobBase ]
  description: It's a mini dragon, closely related to full sized dragons and not their young. They tend to have eccentric personalities and a penchant for greed to match their draconic ancestry.
  abstract: true
  components:
    - type: InputMover
    - type: MobMover
    - type: HTN
      rootTask:
        task: XenoCompound
      blackboard:
        NavSmash: !type:Bool
          true
    - type: Sprite
      drawdepth: Mobs
      sprite: _Funkystation/Mobs/Pets/minidragon.rsi
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
    - type: CombatMode
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.3
          density: 60
          mask:
            - FlyingMobMask
          layer:
            - FlyingMobLayer
    - type: MobThresholds
      thresholds:
        0: Alive
        150: Critical
        200: Dead
    - type: Stamina
      baseCritThreshold: 200
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
          BaseUnshaded: mouth
        Critical:
          Base: crit
          BaseUnshaded: crit_mouth
        Dead:
          Base: dead
          BaseUnshaded: dead_mouth
    - type: Butcherable
      spawned:
        - id: FoodMeatDragon
          amount: 1
        - id: MaterialToothSpaceCarp1
          amount: 4
    - type: MeleeWeapon
      altDisarm: false
      soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
      damage:
        types:
          Piercing: 8
          Slash: 8
    - type: TypingIndicator
      proto: lizard
    - type: Tag
      tags:
        - DoorBumpOpener
        - CannotSuicide
    - type: LizardAccent
    - type: Speech
      speechSounds: Lizard
      speechVerb: Reptilian
      allowedEmotes: ['Thump', 'Weh']
    - type: InteractionPopup
      successChance: 0.5 
      interactSuccessString: petting-success-minidragon
      interactFailureString: petting-failure-minidragon
      interactFailureSound:
        path: /Audio/Effects/bite.ogg
    - type: Puller
      needsHands: false
    - type: MovementSpeedModifier
      baseWalkSpeed: 3
      baseSprintSpeed: 4
      weightlessModifier: 1.5
    - type: MobState
    - type: MobStateActions
      actions:
        Critical:
        - ActionCritSuccumb
        - ActionCritLastWords 
    - type: SlowOnDamage
      speedModifierThresholds:
        75: 0.85
        125: 0.7 
    - type: StatusEffects
      allowed:
      - SlowedDown
      - Electrocution
      - ForcedSleep
      - TemporaryBlindness
      - Pacified
      - RadiationProtection
      - Drowsiness
      - Adrenaline
    - type: Metabolizer
      solutionOnBody: true
      updateInterval: 0.25
      metabolizerTypes: [ Dragon ]
      stages: [ Digestion, Bloodstream ]
    - type: Flammable
      damage:
        types: {}
    - type: Temperature
      heatDamageThreshold: 2400
      coldDamageThreshold: 0
    - type: Prying # Open door from xeno.yml.
      pryPowered: true
      force: true
      speedModifier: 3
      useSound:
        path: /Audio/Items/crowbar.ogg
    - type: PassiveDamage
      allowedStates:
      - Alive
      - Critical
      damage:
        types:
          Heat: -0.8
          Blunt: -0.8
          Piercing: -0.8
          Slash: -0.8

- type: entity
  name: mini dragon
  parent: BaseMobMiniDragon
  id: MobMiniDragon
  components:
    - type: Sprite
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
      - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
        state: mouth
        shader: unshaded
    - type: RandomSprite
      available:
      - enum.DamageStateVisualLayers.Base:
          alive: Rainbow
        enum.DamageStateVisualLayers.BaseUnshaded:
          mouth: ""
    - type: GhostRole
      prob: 1
      makeSentient: true
      allowSpeech: true
      allowMovement: true
      name: ghost-role-information-mini-dragon-name
      description: ghost-role-information-mini-dragon-description
      rules: ghost-role-information-mini-dragon-rules
      raffle:
        settings: default
      mindRoles:
      - MindRoleGhostRoleFreeAgent
    - type: GhostTakeoverAvailable
    - type: NpcFactionMember
      factions:
      - Passive
    - type: FactionException

- type: entity
  name: domesticated mini dragon
  parent: BaseMobMiniDragon
  id: MobMiniDragonFriendly
  description: It's a domesticated mini dragon. Even seeing a mini dragon that has been domesticated is a once in a lifetime opportunity.
  components:
    - type: Sprite
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
      - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
        state: mouth
        shader: unshaded
    - type: RandomSprite
      available:
      - enum.DamageStateVisualLayers.Base:
          alive: Rainbow
        enum.DamageStateVisualLayers.BaseUnshaded:
          mouth: ""
    - type: GhostRole
      prob: 1
      makeSentient: true
      allowSpeech: true
      allowMovement: true
      name: ghost-role-information-mini-dragon-friendly-name
      description: ghost-role-information-mini-dragon-friendly-description
      rules: ghost-role-information-mini-dragon-friendly-rules
      raffle:
        settings: default
      mindRoles:
      - MindRoleGhostRoleNeutral
    - type: GhostTakeoverAvailable
    - type: NpcFactionMember
      factions:
      - Passive
    - type: FactionException