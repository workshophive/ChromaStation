# agony hell world

- type: entity
  id: BaseMobScurret
  parent: BaseMobSpeciesOrganic
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: HumanoidAppearance
    species: Scurret
  - type: Puller
    needsHands: false
  - type: Carriable
  - type: Icon
    sprite: Mobs/Species/Scurret/parts.rsi
    state: full
  - type: Body
    prototype: Scurret
    requiredLegs: 2
  - type: MobThresholds
    thresholds:
      0: Alive
      60: Critical
      125: Dead
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
    heatDamageThreshold: 390 # increased range
    coldDamageThreshold: 255
  - type: Butcherable # you monster.
    spawned:
    - id: FootMeat
      amount: 4
  - type: Speech
    speechVerb: Wawa
    speechSounds: Wawa
    allowedEmotes: ['Thump','Squeak']
  - type: TypingIndicator
    proto: moth
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 30
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 5 # nerfed from wizden
