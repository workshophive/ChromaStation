- type: entity
  id: PartScurret
  parent: BaseItem
  name: "scurret body part"
  abstract: true
  components:
    - type: Sprite
      netsync: false
      sprite: Mobs/Species/Scurret/parts.rsi
    - type: Icon
      sprite: Mobs/Species/Scurret/parts.rsi
    - type: Damageable
      damageContainer: OrganicPart # Shitmed
    - type: BodyPart
    - type: ContainerContainer
      containers:
        bodypart: !type:Container
          ents: []

- type: entity
  id: TorsoScurret
  name: "scurret torso"
  parent: PartScurret
  components:
    - type: Sprite
      state: "torso"
    - type: Icon
      state: "torso"
    - type: BodyPart
      partType: Torso

- type: entity
  id: HeadScurret
  name: "scurret head"
  parent: PartScurret
  components:
    - type: Sprite
      state: "head"
    - type: Icon
      state: "head"
    - type: BodyPart
      partType: Head
    - type: Input
      context: "ghost"
    - type: MovementSpeedModifier
      baseWalkSpeed: 0
      baseSprintSpeed: 0
    - type: InputMover
    - type: GhostOnMove

- type: entity
  id: LeftArmScurret
  name: "left scurret arm"
  parent: PartScurret
  components:
    - type: Sprite
      state: "l_arm"
    - type: Icon
      state: "l_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Left

- type: entity
  id: RightArmScurret
  name: "right scurret arm"
  parent: PartScurret
  components:
    - type: Sprite
      state: "r_arm"
    - type: Icon
      state: "r_arm"
    - type: BodyPart
      partType: Arm
      symmetry: Right

- type: entity
  id: LeftHandScurret
  name: "left scurret hand"
  parent: PartScurret
